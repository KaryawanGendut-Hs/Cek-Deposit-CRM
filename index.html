<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Analytics - Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600;800&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card: #0f1117;
            --accent: #10b981;
            --accent-soft: rgba(16, 185, 129, 0.1);
            --blue-gold: #3b82f6;
            --text-gold: #e2e8f0;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            color: var(--text-gold);
            margin: 0;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-card {
            width: 100%;
            max-width: 1050px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        /* Border Glow Effect */
        .main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--blue-gold), transparent);
            opacity: 0.5;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            letter-spacing: 4px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .flex-container {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }

        .box { flex: 1; display: flex; flex-direction: column; }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-dim);
            letter-spacing: 1.5px;
        }

        textarea {
            height: 200px;
            background: #0a0c10;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            color: #fff;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--blue-gold);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        button {
            flex: 1;
            padding: 18px;
            border-radius: 100px;
            border: none;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            font-size: 0.8rem;
        }

        .btn-check {
            background: #fff;
            color: #000;
        }

        .btn-check:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.1);
        }

        .btn-copy {
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
        }

        .btn-copy:hover {
            background: rgba(255,255,255,0.05);
            border-color: #fff;
        }

        .btn-import {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 5px 15px;
            font-size: 0.6rem;
            width: auto;
            flex: none;
        }

        /* Results List */
        .result-container {
            border-top: 1px solid var(--border);
            padding-top: 30px;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 15px;
            background: linear-gradient(90deg, rgba(255,255,255,0.02), transparent);
            border-radius: 15px;
            border-left: 2px solid transparent;
            transition: 0.3s;
            animation: fadeIn 0.5s ease-out;
        }

        .item-row:hover {
            border-left-color: var(--accent);
            background: rgba(16, 185, 129, 0.05);
        }

        .user-id {
            font-weight: 700;
            font-size: 1rem;
            min-width: 150px;
        }

        .details {
            flex: 1;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
        }

        .amount {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
            min-width: 150px;
            text-align: right;
        }

        .fail-row { opacity: 0.5; border-left-color: #ef4444; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .flex-container { flex-direction: column; }
            .item-row { flex-direction: column; gap: 10px; text-align: center; }
            .amount { text-align: center; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h2>DEPOSIT ANALYTICS</h2>
        <p>Elite Processing System</p>
    </div>

    <div class="flex-container">
        <div class="box">
            <div class="label-row"><label>TARGET ACCOUNTS</label></div>
            <textarea id="listUser" placeholder="Enter ID..."></textarea>
        </div>
        <div class="box">
            <div class="label-row">
                <label>MUTATION SOURCE</label>
                <input type="file" id="fileInput" accept=".csv, .txt" style="display: none;" onchange="handleFileUpload(this)">
                <button class="btn-import" onclick="document.getElementById('fileInput').click()">IMPORT FILE</button>
            </div>
            <textarea id="historyData" placeholder="Paste data..."></textarea>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-check" onclick="processData()">EXECUTE ANALYSIS</button>
        <button class="btn-copy" onclick="copyToClipboard()">COPY REPORT</button>
    </div>

    <div id="output" class="result-container">
        <p style="text-align: center; color: var(--text-dim); font-size: 0.8rem;">Awaiting Data input...</p>
    </div>
</div>

<script>
let lastGeneratedText = "";

function handleFileUpload(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => { 
        document.getElementById('historyData').value = e.target.result;
        alert("File loaded successfully.");
    };
    reader.readAsText(file);
}

function processData() {
    const userInputs = [...new Set(document.getElementById('listUser').value.split('\n').filter(i => i.trim() !== ""))];
    const historyLines = document.getElementById('historyData').value.split('\n');
    
    let success = [];
    let failed = [];

    userInputs.forEach(user => {
        let target = user.trim().toLowerCase();
        let payments = [];
        let total = 0;

        historyLines.forEach(line => {
            let cleanLine = line.replace(/"/g, '');
            let columns = cleanLine.split(/[,;\t]| {2,}/); 
            let idx = columns.findIndex(col => col.trim().toLowerCase() === target);

            if (idx !== -1) {
                for (let i = idx + 1; i < columns.length; i++) {
                    let raw = columns[i].trim();
                    let valStr = raw.split('.')[0].replace(/[^0-9]/g, '');
                    if (valStr.length >= 4) {
                        let val = parseInt(valStr);
                        total += val;
                        payments.push(val.toLocaleString('en-US'));
                        break;
                    }
                }
            }
        });

        if (payments.length > 0) {
            success.push({ user: user.trim(), details: payments.join(' + '), total: total.toLocaleString('en-US') });
        } else {
            failed.push(user.trim());
        }
    });

    render(success, failed);
}

function render(success, failed) {
    let html = `<div class="section-title" style="color: var(--accent)">COMPLETED (${success.length})</div>`;
    success.forEach(item => {
        html += `
            <div class="item-row">
                <div class="user-id">${item.user}</div>
                <div class="details">${item.details}</div>
                <div class="amount">Rp ${item.total}</div>
            </div>`;
    });

    html += `<div class="section-title" style="color: var(--text-dim); margin-top: 40px;">PENDING/NOT FOUND (${failed.length})</div>`;
    failed.forEach(user => {
        html += `
            <div class="item-row fail-row">
                <div class="user-id">${user}</div>
                <div class="details">No matching records found</div>
                <div class="amount">Rp 0</div>
            </div>`;
    });

    document.getElementById('output').innerHTML = html;
    
    // Setup copy text
    lastGeneratedText = success.map(i => `${i.user} > ${i.details} = ${i.total}`).join('\n') + 
                        "\n\nNot Found:\n" + failed.join(', ');
}

function copyToClipboard() {
    if (!lastGeneratedText) return;
    navigator.clipboard.writeText(lastGeneratedText).then(() => {
        alert("Report copied to clipboard.");
    });
}
</script>
</body>
</html>
